# aicentral 主設定（可提交版控）；機密請見 config/secret.yaml

app:
  env: development
  log_level: INFO

defaults:
  model: local-chat
  embedding_model: local-embed
  timeout: 120
  structured_mode: tool

# Gemini 多模型池：rpm/rpd 雙欄位（官方 + 自訂保守值）
# 官方配額來源：docs/gemini-limit.md → tiers.free（Google AI Studio 免費階層）
# tpm 僅記於文件，輪換邏輯目前依 rpm/rpd 計數
# - 僅一個 model：固定使用該模型，達限後等待下一分鐘
# - 多個 model：依序輪換；本分鐘用盡則切下一個；全滿則等到下一分鐘
gemini_pools:
  default:
    # 跨程序持久化：輪換索引 + 各模型 rpm/rpd 累計（gemini-limit.md 方案二）
    rate_limit_store_path: config/rate_limit_store.json
    # wait_poll_seconds 已棄用；全池滿時依「上次請求」所在分鐘的結束時間等待
    wait_poll_seconds: 1.0
    # 429 指數退讓（gemini-limit.md 方案四）；有 Retry-After 標頭時優先採用
    retry_initial_seconds: 2.0
    retry_max_seconds: 32.0
    models:
      # gemini-3.1-flash-lite（穩定 ID；preview 別名見官方文件）
      - model_id: gemini-3.1-flash-lite
        rpm_official: 15
        rpm_limit: 14
        rpd_official: 500
        rpd_limit: 499
      # gemini-3-flash-preview（API 無 gemini-3-flash）
      - model_id: gemini-3-flash-preview
        rpm_official: 5
        rpm_limit: 4
        rpd_official: 20
        rpd_limit: 19
      # gemini-2.5-flash — rpm 15, tpm 1_000_000, rpd 1500
      - model_id: gemini-2.5-flash
        rpm_official: 5
        rpm_limit: 4
        rpd_official: 20
        rpd_limit: 19
      # gemini-2.5-flash-lite — rpm 30, tpm 2_000_000, rpd 1500
      - model_id: gemini-2.5-flash-lite
        rpm_official: 10
        rpm_limit: 9
        rpd_official: 20
        rpd_limit: 19
      # gemini-3.5-flash — rpm 15, tpm 1_000_000, rpd 1500
      - model_id: gemini-3.5-flash
        rpm_official: 5
        rpm_limit: 4
        rpd_official: 20
        rpd_limit: 19

model_list:
  - model_name: local-chat
    provider: ollama
    params:
      model_id: gemma4:e2b
      api_base: secret/ollama.base_url
      api_key: secret/ollama.api_key

  # 歷史 SEGMENT_COMPRESS 向量分群用（Ollama: ollama pull nomic-embed-text）
  - model_name: local-embed
    provider: ollama
    params:
      model_id: nomic-embed-text
      api_base: secret/ollama.base_url
      api_key: secret/ollama.api_key

  - model_name: cloud-chat
    provider: openai
    params:
      model_id: gpt-4o-mini
      api_base: secret/openai.api_base
      api_key: secret/openai.api_key
    timeout: 60

  - model_name: claude-sonnet
    provider: anthropic
    params:
      model_id: claude-sonnet-4-20250514
      api_base: secret/anthropic.api_base
      api_key: secret/anthropic.api_key
      api_version: secret/anthropic.api_version

  # 使用 gemini_pools.default 輪換；params.model_id 僅作文件/後備
  - model_name: gemini-flash
    provider: gemini
    gemini_pool: default
    params:
      model_id: gemini-3.5-flash
      api_key: secret/gemini.api_key
      api_base: secret/gemini.api_base

router:
  fallbacks:
    - model_name: local-chat
      fallbacks: [cloud-chat]
  fallback_on:
    - connection_error
    - timeout

mcp_servers:
  deepwiki:
    transport: http
    url: https://mcp.deepwiki.com/mcp
    description: DeepWiki MCP
    timeout: 30
    auth_type: none

mcp_settings:
  tool_name_prefix: true
  client_timeout: 30

aicentral_settings:
  dev: false
  system_prompt: |
    請一律使用繁體中文（臺灣正體）回覆，用語自然簡潔。若使用者使用其他語言提問，仍以繁體中文回答。
  drop_unsupported_params: true

gateway:
  enabled: true
  bind_host: 127.0.0.1
  bind_port: 8080
  localhost_only: true
  reject_non_local_client: true
  max_body_bytes: 20971520
  max_image_bytes: 10485760
  fetch_remote_images: false
  optional_token: null
